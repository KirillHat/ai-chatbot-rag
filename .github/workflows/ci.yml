name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  secret-scan:
    name: detect-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install scanner
        run: |
          python -m pip install --upgrade pip
          pip install detect-secrets
      - name: Scan tracked source files
        run: |
          python - <<'PY'
          import json
          import subprocess

          files = subprocess.check_output(
              ["git", "ls-files", "*.py", "*.toml", "*.yml", "*.yaml", "*.ini", "*.sh", "Dockerfile"],
              text=True,
          ).splitlines()
          if not files:
              print("No files to scan.")
              raise SystemExit(0)

          proc = subprocess.run(
              ["detect-secrets", "scan", *files],
              check=True,
              capture_output=True,
              text=True,
          )
          data = json.loads(proc.stdout)
          findings = data.get("results", {})
          if findings:
              print(json.dumps(findings, indent=2))
              raise SystemExit(1)
          print("detect-secrets: clean")
          PY

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        env:
          ANTHROPIC_API_KEY: ""
        run: pytest --cov=app --cov-report=xml -q
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  smoke:
    name: Runtime smoke
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Start app and run smoke checks
        env:
          ANTHROPIC_API_KEY: ""
          ADMIN_API_TOKEN: ci-token-xxxxxxxxxxxxxx
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8990 > /tmp/rag.log 2>&1 &
          PID=$!
          trap "kill $PID || true" EXIT
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:8990/health >/tmp/health.json; then
              break
            fi
            sleep 1
          done
          test "$(curl -s -o /tmp/health2.json -w '%{http_code}' http://127.0.0.1:8990/health)" = "200"
          test "$(curl -s -o /tmp/chat.json -w '%{http_code}' -H 'Content-Type: application/json' -d '{"message":"hello","history":[],"session_id":null}' http://127.0.0.1:8990/api/chat)" = "503"
          grep -q '"status":"degraded"' /tmp/health2.json

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ai-chatbot-rag:ci
      - name: Smoke-test the image
        run: |
          docker run -d --name api -p 8000:8000 \
            -e ANTHROPIC_API_KEY="" \
            -e ADMIN_API_TOKEN="ci-token-xxxxxxxxxxxxxx" \
            ai-chatbot-rag:ci
          for i in {1..15}; do
            if curl -fs http://localhost:8000/health > /tmp/h.json; then
              cat /tmp/h.json
              exit 0
            fi
            sleep 2
          done
          docker logs api
          exit 1
