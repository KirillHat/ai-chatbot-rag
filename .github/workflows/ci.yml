name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check .
      - name: Test
        env:
          ANTHROPIC_API_KEY: ""
        run: pytest --cov=app --cov-report=xml -q
      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ai-chatbot-rag:ci
      - name: Smoke-test the image
        run: |
          docker run -d --name api -p 8000:8000 \
            -e ANTHROPIC_API_KEY="" \
            -e ADMIN_API_TOKEN="ci-token-xxxxxxxxxxxxxx" \
            ai-chatbot-rag:ci
          for i in {1..15}; do
            if curl -fs http://localhost:8000/health > /tmp/h.json; then
              cat /tmp/h.json
              exit 0
            fi
            sleep 2
          done
          docker logs api
          exit 1
