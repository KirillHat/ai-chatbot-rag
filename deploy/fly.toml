# Fly.io deployment config — `fly launch --copy-config deploy/fly.toml`.
# Tweak the `app =` line + region to taste before launching.

app = "ai-chatbot-rag"           # change to a globally-unique name
primary_region = "iad"           # closest US east; pick yours from `flyctl platform regions`
kill_signal  = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8000"
  CHROMA_DIR = "/data/chroma"
  SQLITE_PATH = "/data/app.db"
  UPLOAD_DIR = "/data/uploads"
  CORS_ORIGINS = "*"

# Persistent volume — survives restarts so the KB is not lost.
# Create once with: `fly volumes create chatbot_data --region iad --size 1`
[mounts]
  source = "chatbot_data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"     # scale to zero when idle
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    type = "http"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512  # MiniLM ONNX needs ~150 MB; 512 is comfortable
